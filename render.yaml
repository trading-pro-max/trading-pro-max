services:
  - type: web
    runtime: node
    name: trading-pro-max
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: bash scripts/render/build.sh
    preDeployCommand: bash scripts/render/predeploy.sh
    startCommand: bash scripts/render/start.sh
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/tradingpromax.db
      - key: CORS_ORIGIN
        value: "*"
      - key: AUTH_TOKEN_SECRET
        generateValue: true
      - key: DEMO_USER_EMAIL
        value: admin@tradingpromax.local
      - key: DEMO_USER_PASSWORD
        value: admin123
      - key: DEMO_USER_NAME
        value: Trading Pro Max Admin
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: STRIPE_PORTAL_RETURN_URL
        sync: false
    disk:
      name: trading-pro-max-data
      mountPath: /var/data
      sizeGB: 1